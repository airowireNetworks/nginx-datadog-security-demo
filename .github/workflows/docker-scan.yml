name: Datadog Security Scan Demo

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  security-scan:
    runs-on: ubuntu-latest

    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_SITE: ${{ secrets.DD_SITE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Docker
        run: docker --version

      - name: Build Docker Image
        run: |
          docker build -t nginx-datadog-demo:${{ github.run_number }} .
          docker tag nginx-datadog-demo:${{ github.run_number }} nginx-datadog-demo:latest

      - name: Verify Docker Images
        run: docker images

      - name: Verify Image Exists
        run: docker image inspect nginx-datadog-demo:${{ github.run_number }}

      - name: Install Datadog Security CLI
        run: |
          curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public \
            | sudo gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable datadog-security-cli" \
            | sudo tee /etc/apt/sources.list.d/datadog-security-cli.list

          sudo apt-get update
          sudo apt-get install -y datadog-security-cli

      - name: Verify Datadog Security CLI
        run: datadog-security-cli version

      - name: Show CLI Help
        run: datadog-security-cli image --help

      - name: Debug Datadog Environment
        run: |
          echo "DD_SITE=[$DD_SITE]"
          echo "DD_API_KEY length: ${#DD_API_KEY}"
          echo "DD_APP_KEY length: ${#DD_APP_KEY}"
          echo "Build Number: ${{ github.run_number }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

      - name: Scan Docker Image
        continue-on-error: true
        run: |
          datadog-security-cli image nginx-datadog-demo:${{ github.run_number }} \
            --tag repo:${{ github.repository }} \
            --tag build_number:${{ github.run_number }} \
            --tag run_id:${{ github.run_id }} \
            --tag workflow:${{ github.workflow }} \
            --tag branch:${{ github.ref_name }} \
            --tag commit:${{ github.sha }} \
            --tag actor:${{ github.actor }} \
            --tag image_tag:${{ github.run_number }} \
            -o json

      - name: Workflow Summary
        run: |
          echo "====================================="
          echo "Build Number : ${{ github.run_number }}"
          echo "Run ID       : ${{ github.run_id }}"
          echo "Repository   : ${{ github.repository }}"
          echo "Branch       : ${{ github.ref_name }}"
          echo "Commit       : ${{ github.sha }}"
          echo "Image        : nginx-datadog-demo:${{ github.run_number }}"
          echo "====================================="
