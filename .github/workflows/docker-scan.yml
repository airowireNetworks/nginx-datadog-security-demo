name: Build Blackbit Assets

on:
  workflow_dispatch:

  schedule:
    - cron: '0 9 * * MON'

  push:
    paths:
      - 'blackbit-assets/**'

env:
  DD_API_KEY: ${{ secrets.DD_API_KEY }}
  DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
  DD_SITE: ${{ secrets.DD_SITE }}
  TZ: Europe/Berlin

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: blackbitdigital/blackbit-assets
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.run_number }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./blackbit-assets
          file: ./blackbit-assets/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Verify Docker Images
        run: |
          docker pull blackbitdigital/blackbit-assets:latest
          docker pull blackbitdigital/blackbit-assets:${{ github.run_number }}

      - name: Install Datadog Security CLI
        run: |
          curl -LO https://github.com/DataDog/datadog-sca-github-action/releases/latest/download/datadog-security-cli_Linux_x86_64.tar.gz
          tar -xzf datadog-security-cli_Linux_x86_64.tar.gz
          sudo mv datadog-security-cli /usr/local/bin/
          datadog-security-cli version

      - name: Scan Container Image
        continue-on-error: true
        run: |
          datadog-security-cli image blackbitdigital/blackbit-assets:${{ github.run_number }} \
            --tag image:blackbit-assets \
            --tag build_number:${{ github.run_number }} \
            --tag run_id:${{ github.run_id }} \
            --tag workflow:${{ github.workflow }} \
            --tag repository:${{ github.repository }} \
            --tag branch:${{ github.ref_name }} \
            --tag commit:${{ github.sha }} \
            --tag actor:${{ github.actor }} \
            --tag image_tag:${{ github.run_number }} \
            -o json

      - name: Workflow Summary
        run: |
          echo "=========================================="
          echo "Build Number : ${{ github.run_number }}"
          echo "Run ID       : ${{ github.run_id }}"
          echo "Repository   : ${{ github.repository }}"
          echo "Branch       : ${{ github.ref_name }}"
          echo "Commit       : ${{ github.sha }}"
          echo "Image        : blackbitdigital/blackbit-assets:${{ github.run_number }}"
          echo "Scan completed successfully."
          echo "=========================================="
