name: Datadog Security Scan Demo

on:
  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    env:
      DD_API_KEY: ${{ secrets.DD_API_KEY }}
      DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
      DD_SITE: ${{ secrets.DD_SITE }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show GitHub Build Information
        run: |
          echo "Repository    : ${{ github.repository }}"
          echo "Workflow      : ${{ github.workflow }}"
          echo "Run Number    : ${{ github.run_number }}"
          echo "Run ID        : ${{ github.run_id }}"
          echo "Commit SHA    : ${{ github.sha }}"
          echo "Branch        : ${{ github.ref_name }}"
          echo "Actor         : ${{ github.actor }}"

      - name: Verify Docker
        run: docker --version

      - name: Build Docker Image
        run: |
          docker build \
            --label org.opencontainers.image.title="nginx-datadog-demo" \
            --label org.opencontainers.image.source="https://github.com/${{ github.repository }}" \
            --label org.opencontainers.image.revision="${{ github.sha }}" \
            --label org.opencontainers.image.version="${{ github.run_number }}" \
            --label org.opencontainers.image.created="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --label com.datadoghq.image.source_path="Dockerfile" \
            -t nginx-datadog-demo:latest \
            .

      - name: Verify Image
        run: |
          docker image inspect nginx-datadog-demo:latest

      - name: Show Image Labels
        run: |
          docker inspect nginx-datadog-demo:latest \
          --format '{{ json .Config.Labels }}'

      - name: Install Datadog Security CLI
        run: |
          curl -fsSL https://keys.datadoghq.com/DATADOG_APT_KEY_CURRENT.public \
            | sudo gpg --dearmor -o /usr/share/keyrings/datadog-archive-keyring.gpg

          echo "deb [signed-by=/usr/share/keyrings/datadog-archive-keyring.gpg] https://apt.datadoghq.com/ stable datadog-security-cli" \
            | sudo tee /etc/apt/sources.list.d/datadog-security-cli.list

          sudo apt-get update
          sudo apt-get install -y datadog-security-cli

      - name: Verify Datadog Security CLI
        run: datadog-security-cli version

      - name: Scan Docker Image
        continue-on-error: true
        run: |
          datadog-security-cli image nginx-datadog-demo:latest \
            --dockerfile ./Dockerfile \
            --tag repository:${{ github.repository }} \
            --tag branch:${{ github.ref_name }} \
            --tag commit:${{ github.sha }} \
            --tag workflow:${{ github.workflow }} \
            --tag actor:${{ github.actor }} \
            --tag image:nginx-datadog-demo \
            -o json

      - name: Workflow Summary
        run: |
          echo "=========================================="
          echo "Datadog Security Scan Completed"
          echo "=========================================="
          echo "Repository : ${{ github.repository }}"
          echo "Workflow   : ${{ github.workflow }}"
          echo "Run Number : ${{ github.run_number }}"
          echo "Run ID     : ${{ github.run_id }}"
          echo "Commit      : ${{ github.sha }}"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Image       : nginx-datadog-demo:latest"
          echo "=========================================="
